<style>
    .t2 { padding: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #222; }
    .t2 h1 { font-size: 38px; font-weight: 800; margin: 0; color: #111; letter-spacing: -0.5px;}
    .t2 .subtitle { font-size: 18px; color: #555; margin-bottom: 15px; font-weight: 500;}
    .t2 .contact { font-size: 13px; background: #f4f4f5; padding: 12px; border-radius: 6px; margin-bottom: 25px; line-height: 1.6;}
    .t2 h2 { font-size: 18px; font-weight: bold; margin: 25px 0 12px 0; color: #000; border-bottom: 2px solid #eaeaea; padding-bottom: 4px;}
    .t2 p { font-size: 14px; line-height: 1.6; margin: 0 0 15px 0; color: #333;}
    .t2 .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .t2 .edu-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; border-bottom: 1px dashed #e4e4e7; padding-bottom: 4px;}
    .t2 .proj-box { margin-bottom: 15px; }
</style>
<div class="t2">

    <div class="subtitle" id="prev-title">Role</div>
    
    <div class="contact">

            <h2>Technical Skills</h2><p id="prev-skills"></p>

        <div>

            </div>
            
            <div id="container-proj2" class="proj-box">
                <b style="font-size: 15px; color: #111;"><span id="prev-proj2-title"></span></b> <br>
                <i style="font-size: 13px; color: #666;"><span id="prev-proj2-tech"></span></i>
                <p id="prev-proj2-desc" style="margin-top: 5px;"></p>
            </div>

            <div id="container-proj3" class="proj-box">
                <b style="font-size: 15px; color: #111;"><span id="prev-proj3-title"></span></b> <br>

                <p id="prev-proj3-desc" style="margin-top: 5px;"></p>
            </div>

            <div id="container-proj4" class="proj-box">
                <b style="font-size: 15px; color: #111;"><span id="prev-proj4-title"></span></b> <br>
